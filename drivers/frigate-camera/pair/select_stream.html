<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }
    h2 { margin-top: 0; }
    p.hint { color: #666; }
    p.error { color: #c00; }
    ul { list-style: none; margin: 0; padding: 0; }
    li.row {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      font-size: 16px;
      border: 1px solid #007aff;
      color: #007aff;
      border-radius: 8px;
      cursor: pointer;
      box-sizing: border-box;
    }
    li.row:hover { background: #eaf3ff; }
  </style>
</head>
<body>
  <h2>Select a live stream</h2>
  <p class="hint" id="hint">Loading streams&hellip;</p>
  <ul id="streams"></ul>

  <script type="text/javascript">
    try {
      const hint = document.getElementById('hint');
      const list = document.getElementById('streams');

      Homey.emit('get_selected_camera').then((camera) => {
        const streamNames = Object.entries((camera && camera.streams) || {});

        if (streamNames.length === 0) {
          hint.textContent = 'No live streams configured for "' + camera.name + '" in Frigate.';
          hint.className = 'error';
          return;
        }

        hint.textContent = 'Streams available for "' + camera.name + '":';

        streamNames.forEach(([label, streamName]) => {
          const item = document.createElement('li');
          item.className = 'row';
          item.textContent = label + ' (' + streamName + ')';
          item.addEventListener('click', () => {
            const device = {
              name: camera.name,
              data: { id: camera.name, cameraName: camera.name },
              settings: { streamName },
            };

            Homey.setViewStoreValue('add_devices', 'devices', [device])
              .then(() => Homey.showView('add_devices'));
          });
          list.appendChild(item);
        });
      }).catch((err) => {
        hint.textContent = err.message || String(err);
        hint.className = 'error';
      });
    } catch (syncErr) {
      document.getElementById('hint').textContent = syncErr.message || String(syncErr);
    }
  </script>
</body>
</html>
