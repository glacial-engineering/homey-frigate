<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      text-align: center;
    }
    h2 { margin-top: 0; }
    p { color: #666; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 16px;
      border: 1px solid #007aff;
      background: #007aff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Add Frigate Cameras</h2>
  <p>Cameras will be fetched from the Frigate base URL configured in app settings.</p>
  <button class="btn" onclick="Homey.showView('select_camera')">Discover cameras</button>
</body>
</html>
